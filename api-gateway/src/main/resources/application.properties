server.port=8080
spring.application.name=api-gateway

# Routes
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://product-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**

# Swagger docs routes
spring.cloud.gateway.routes[2].id=user-service-docs
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/user-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[3].id=product-service-docs
spring.cloud.gateway.routes[3].uri=lb://product-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/product-service/v3/api-docs
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/product-service/v3/api-docs,/v3/api-docs

# Eureka
eureka.client.service-url.defaultZone=http://0.0.0.0:8761/eureka/
eureka.instance.prefer-ip-address=true

# Swagger aggregation
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Product Service
springdoc.swagger-ui.urls[1].url=/product-service/v3/api-docs

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true

spring.jmx.enabled=false