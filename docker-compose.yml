version: '3.8'

services:

  # MySQL for multiple services
  mysql:
    image: mysql:8.0
    container_name: smartshop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Jagrit@123
      MYSQL_DATABASE: smartshop
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smartshop-network

  # MongoDB (optional - using Atlas)
  # Already on Atlas ✅

  # Eureka Server
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - smartshop-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
    networks:
      - smartshop-network

  # User Service
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartshop_users?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Jagrit@123
      EUREKA_URL: http://eureka-server:8761/eureka/
    networks:
      - smartshop-network

  # Product Service
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
    environment:
      MONGODB_URI: mongodb+srv://smartshop:Smartshop%40123@smartshop-cluster.yxyjjlh.mongodb.net/smartshop_products?retryWrites=true&w=majority
      EUREKA_URL: http://eureka-server:8761/eureka/
    networks:
      - smartshop-network

  # Inventory Service
  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartshop_inventory?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Jagrit@123
      EUREKA_URL: http://eureka-server:8761/eureka/
    networks:
      - smartshop-network

  # Order Service
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartshop_orders?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Jagrit@123
      EUREKA_URL: http://eureka-server:8761/eureka/
    networks:
      - smartshop-network

  # Payment Service
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8085:8085"
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartshop_payments?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Jagrit@123
      EUREKA_URL: http://eureka-server:8761/eureka/
    networks:
      - smartshop-network

  # Notification Service
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
    networks:
      - smartshop-network

networks:
  smartshop-network:
    driver: bridge

volumes:
  mysql_data: