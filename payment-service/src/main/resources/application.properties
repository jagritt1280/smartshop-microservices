server.port=8085
spring.application.name=payment-service

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smartshop_payments?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Jagrit@123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.max.block.ms=1000
spring.kafka.producer.properties.request.timeout.ms=1000
spring.kafka.producer.properties.delivery.timeout.ms=2000

# Eureka
eureka.client.service-url.defaultZone=http://0.0.0.0:8761/eureka/
eureka.instance.prefer-ip-address=true

# Swagger
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

spring.jmx.enabled=false